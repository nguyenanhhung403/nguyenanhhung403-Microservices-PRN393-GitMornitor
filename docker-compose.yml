services:
  identity-api:
    image: identity-api
    build:
      context: .
      dockerfile: src/Services/Identity.API/Dockerfile
    ports:
      - "5051:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/GitMonitor.db
    volumes:
      - .:/app/data

  classroom-api:
    image: classroom-api
    build:
      context: .
      dockerfile: src/Services/Classroom.API/Dockerfile
    ports:
      - "5020:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/GitMonitor.db
    volumes:
      - .:/app/data

  monitoring-api:
    image: monitoring-api
    build:
      context: .
      dockerfile: src/Services/Monitoring.API/Dockerfile
    ports:
      - "5039:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/GitMonitor.db
    volumes:
      - .:/app/data

  apigateway:
    image: apigateway
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identity-api:8080/
      - ReverseProxy__Clusters__classroom-cluster__Destinations__destination1__Address=http://classroom-api:8080/
      - ReverseProxy__Clusters__monitoring-cluster__Destinations__destination1__Address=http://monitoring-api:8080/
    depends_on:
      - identity-api
      - classroom-api
      - monitoring-api

  clientapp:
    image: clientapp
    build:
      context: ./ClientApp
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - apigateway
